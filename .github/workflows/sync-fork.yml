name: Sync to Personal Fork

on:
  push:
    branches:
      - claude/eager-goldberg-p77x8t

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to personal fork main
        run: |
          git remote add fork https://garrydoubleU:${{ secrets.FORK_PAT }}@github.com/garrydoubleU/Sunlite-CRM.git
          git push fork HEAD:main --force
          git push fork HEAD:claude/eager-goldberg-p77x8t --force

      - name: Trigger Vercel deploy hook (optional)
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            sleep 5
            curl -s -X POST "$VERCEL_DEPLOY_HOOK"
          else
            echo "No VERCEL_DEPLOY_HOOK set — skipping (Vercel auto-deploys from the fork)."
          fi
